 L778.7693,544 L768.7693,534" fill="#FFFFCC" style="stroke:#CCCC88;stroke-width:1;"/><text fill="#000000" font-family="'Helvetica'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="195.3691" x="528.99" y="548.2402">Prompt caching dans agentigslide</text><line style="stroke:#CCCC88;stroke-width:1;" x1="523.99" x2="777.7693" y1="551" y2="551"/><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="99.3574" x="528.99" y="564.2402">Writers paralleles :</text><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="150.7148" x="528.99" y="576.2402">meme system prompt cache</text><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="159.7559" x="528.99" y="588.2402">-&gt; cout 0.1x apres 1.25x initial</text><line style="stroke:#CCCC88;stroke-width:1;" x1="523.99" x2="777.7693" y1="595" y2="595"/><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="56.6836" x="528.99" y="608.2402">Reviewer :</text><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="147.7734" x="528.99" y="620.2402">catalogue + requete caches</text><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="209.7539" x="528.99" y="632.2402">-&gt; reutilises entre Run() et RunSubset()</text><line style="stroke:#CCCC88;stroke-width:1;" x1="523.99" x2="777.7693" y1="639" y2="639"/><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="234.7793" x="528.99" y="652.2402">ADR 002 : docs/adr/002-prompt-caching.md</text></g><g class="entity" data-qualified-name="GMN26" data-source-line="62" id="ent0027"><path d="M11,879 L11,977 A0,0 0 0 0 11,977 L206.7676,977 A0,0 0 0 0 206.7676,977 L206.7676,889 L196.7676,879 L112.88,879 L108.88,812.38 L104.88,879 L11,879 A0,0 0 0 0 11,879" fill="#FFFFCC" style="stroke:#CCCC