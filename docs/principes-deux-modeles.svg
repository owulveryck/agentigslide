<?plantuml 1.2026.1?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="691px" preserveAspectRatio="none" style="width:1735px;height:691px;background:#FFFFFF;" version="1.1" viewBox="0 0 1735 691" width="1735px" zoomAndPan="magnify"><title>Deux modeles d'orchestration agentique</title><defs/><g><g class="title" data-source-line="2"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="292.4824" x="714.4903" y="23.5352">Deux modeles d'orchestration agentique</text></g><!--cluster A--><g class="cluster" data-qualified-name="A" data-source-line="19" id="ent0002"><rect fill="#FFFFFF" height="338.67" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="700" x="7" y="92.2583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="261.9395" x="226.0303" y="107.7934">Modele A : Orchestration centralisee</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="259.5059" x="227.2471" y="124.2817">(Claude Code, Copilot, Antigravity...)</text></g><!--cluster B--><g class="cluster" data-qualified-name="B" data-source-line="30" id="ent0011"><rect fill="#FFFFFF" height="519.62" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="981" x="747" y="92.2583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="324.7207" x="1075.1396" y="107.7934">Modele B : Agents comme pieces d'ingenierie</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="133.9365" x="1170.5317" y="124.2817">(pipeline slidegen)</text></g><!--entity A_orch--><g class="entity" data-qualified-name="A.A_orch" data-source-line="20" id="ent0003"><rect fill="#FFE9D6" height="85.9531" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="278.7676" x="182.62" y="151.2583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="35.834" x="304.0868" y="174.7934">&#171;llm&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="219.7002" x="212.1537" y="191.2817">Orchestrateur = LLM generaliste</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="258.7676" x="192.62" y="207.77">(flux de controle decide par le modele</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="98.2871" x="272.8602" y="224.2583">a chaque tour)</text></g><!--entity A_a1--><g class="entity" data-qualified-name="A.A_a1" data-source-line="21" id="ent0004"><rect fill="#FFE9D6" height="69.4648" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="170.7734" x="30.61" y="337.4583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="35.834" x="98.0797" y="360.9934">&#171;llm&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="150.7734" x="40.61" y="377.4817">Sous-agent generique</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.7969" x="60.5983" y="393.97">+ skill 'reviewer'</text></g><!--entity A_a2--><g class="entity" data-qualified-name="A.A_a2" data-source-line="22" id="ent0005"><rect fill="#FFE9D6" height="69.4648" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="170.7734" x="236.61" y="337.4583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="35.834" x="304.0797" y="360.9934">&#171;llm&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="150.7734" x="246.61" y="377.4817">Sous-agent generique</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="93.1875" x="275.403" y="393.97">+ skill 'writer'</text></g><!--entity A_ctx--><g class="entity" data-qualified-name="A.A_ctx" data-source-line="23" id="ent0006"><rect fill="#FFFFFF" height="69.4648" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="232.6387" x="442.68" y="337.4583"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="208.5645" x="454.7171" y="360.9934">Contexte injecte implicitement</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="212.6387" x="452.68" y="377.4817">(fichiers ouverts, arborescence,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="185.4795" x="466.2596" y="393.97">historique de conversation)</text></g><!--entity B_orch--><g class="entity" data-qualified-name="B.B_orch" data-source-line="31" id="ent0012"><rect fill="#D6EFFF" height="85.9531" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="274.2012" x="1103.9" y="151.2583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="47.0518" x="1217.4747" y="174.7934">&#171;code&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="178.1719" x="1151.9146" y="191.2817">Orchestrateur = code (Go)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="202.0703" x="1139.9654" y="207.77">flux de controle deterministe,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="254.2012" x="1113.9" y="224.2583">retries bornes, timeouts, parallelisme</text></g><!--entity B_a1--><g class="entity" data-qualified-name="B.B_a1" data-source-line="32" id="ent0013"><rect fill="#FFE9D6" height="85.9531" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="220.5459" x="770.73" y="329.2183"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="35.834" x="863.086" y="352.7534">&#171;llm&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="135.4199" x="813.293" y="369.2417">Agent scope 'Writer'</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="200.5459" x="780.73" y="385.73">modele choisi par complexite</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="120.7432" x="820.6314" y="402.2183">(Haiku ou Sonnet)</text></g><!--entity B_a2--><g class="entity" data-qualified-name="B.B_a2" data-source-line="33" id="ent0014"><rect fill="#FFE9D6" height="85.9531" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="187.5898" x="1026.21" y="329.2183"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="35.834" x="1102.0879" y="352.7534">&#171;llm&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="154.9639" x="1042.523" y="369.2417">Agent scope 'Reviewer'</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="167.5898" x="1036.21" y="385.73">modele choisi par risque</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="117.3184" x="1061.3457" y="402.2183">(Sonnet ou Opus)</text></g><!--entity B_gate--><g class="entity" data-qualified-name="B.B_gate" data-source-line="34" id="ent0015"><rect fill="#DDF5DD" height="85.9531" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="249.8037" x="995.1" y="501.9283"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="44.167" x="1097.9184" y="525.4634">&#171;gate&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="134.9893" x="1052.5072" y="541.9517">Gates deterministes</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="229.8037" x="1005.1" y="558.44">validation schema, budgets texte,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="211.2646" x="1014.3695" y="574.9283">regles de coherence (zero LLM)</text></g><!--entity B_ctx--><g class="entity" data-qualified-name="B.B_ctx" data-source-line="35" id="ent0016"><rect fill="#FFFFFF" height="69.4648" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:0.5;" width="295.2285" x="1400.39" y="337.4583"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="223.3643" x="1436.3221" y="360.9934">Contexte construit explicitement</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="275.2285" x="1410.39" y="377.4817">(catalogue compact, memoire par agent,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.4668" x="1492.2709" y="393.97">prompt caching)</text></g><!--link A_orch to A_a1--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="25" id="lnk7"><path d="M233.96,237.6783 C219.55,246.4583 205.33,256.3783 193,267.2183 C170.06,287.3883 152.9901,310.4119 139.0001,332.3119" fill="none" id="A_orch-to-A_a1" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="135.77,337.3683,143.986,331.9371,138.4617,333.1547,137.2442,327.6304,135.77,337.3683" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="119.0059" x="194" y="280.7866">delegation decidee</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.4551" x="210.2754" y="296.0972">par le modele</text></g><!--link A_orch to A_a2--><g class="link" data-entity-1="ent0003" data-entity-2="ent0005" data-link-type="dependency" data-source-line="26" id="lnk8"><path d="M322,237.3883 C322,267.8883 322,302.5783 322,331.0583" fill="none" id="A_orch-to-A_a2" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="322,337.0583,326,328.0583,322,332.0583,318,328.0583,322,337.0583" style="stroke:#181818;stroke-width:1;"/></g><!--reverse link A_orch to A_ctx--><g class="link" data-entity-1="ent0003" data-entity-2="ent0006" data-link-type="dependency" data-source-line="27" id="lnk10"><path d="M383.8872,241.1852 C424.9772,271.6952 474.87,308.7383 513.14,337.1383" fill="none" id="A_orch-backto-A_ctx" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="379.07,237.6083,383.9113,246.1851,383.0844,240.589,388.6805,239.7621,379.07,237.6083" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="132.2407" x="462.73" y="288.2866">tokens non maitrises</text></g><!--link B_orch to B_a1--><g class="link" data-entity-1="ent0012" data-entity-2="ent0013" data-link-type="dependency" data-source-line="37" id="lnk17"><path d="M1111.45,237.6383 C1088.27,246.5383 1064.63,256.5083 1043,267.2183 C1007.36,284.8583 974.8146,305.1989 944.8746,325.5189" fill="none" id="B_orch-to-B_a1" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="939.91,328.8883,949.6031,327.1439,944.0471,326.0804,945.1106,320.5244,939.91,328.8883" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="75.4546" x="1064.8933" y="280.7866">appel borne</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="117.2412" x="1044" y="296.0