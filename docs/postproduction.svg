etica'" font-size="12" lengthAdjust="spacing" textLength="120.0762" x="292.1626" y="179.1621">(generee ou existante)</text><rect fill="#000000" height="6" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="695.5723" x="17.0884" y="211.9219"/><path d="M185.7954,242.9219 L185.7954,261.9219 L165.7954,265.9219 L185.7954,269.9219 L185.7954,288.9219 A0,0 0 0 0 185.7954,288.9219 L330.8677,288.9219 A0,0 0 0 0 330.8677,288.9219 L330.8677,252.9219 L320.8677,242.9219 L185.7954,242.9219 A0,0 0 0 0 185.7954,242.9219" fill="#FFFFCC" style="stroke:#CCCC88;stroke-width:1;"/><path d="M320.8677,242.9219 L320.8677,252.9219 L330.8677,252.9219 L320.8677,242.9219" fill="#FFFFCC" style="stroke:#CCCC88;stroke-width:1;"/><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="121.3945" x="191.7954" y="257.1621">Rendu visuel complet :</text><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="124.0723" x="191.7954" y="269.1621">debordements, polices,</text><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="71.373" x="191.7954" y="281.1621">espacements</text><rect fill="#F5F5F5" height="56" rx="12.5" ry="12.5" style="stroke:#AAAAAA;stroke-width:1;" width="136.707" x="29.0884" y="237.9219"/><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="97.3652" x="39.0884" y="257.1621">4.1 &#8212; Export PDF</text><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="94.6875" x="39.0884" y="269.1621">Drive.Files.Export</text><text fill="#000000" font-family="'Helvetica'" font-size="12" lengthAdjust="spacing" textLength="116.707" x="39.0884" y="281.1621">(presentationID, PDF)</text><path d="M358.8677,230.9219 L358.8677,300.9219 A0,0 0 0 0 358.8677,300.9219 L521.9399,300.9219 A0,0 0 0 0 521.9399,300.9219 L521.9399,269.9219 L541.9399,265.9219 L521.9399,261.9219 L521.9399,240.9219