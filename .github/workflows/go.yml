name: CI & Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Évite de faire tourner plusieurs builds pour la même branche
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job 1 : Détection de secrets
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2 : Qualité Go, Tests et Build
  go-ci:
    name: Go Quality & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify Dependencies
        run: go mod verify

      - name: Install and Run golangci-lint
        run: |
          # Installation manuelle pour garantir la compatibilité avec Go 1.25
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          # Exécution via le chemin du GOPATH
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: Security Scan (Govulncheck)
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: 'go.mod'

      - name: Run Tests
        run: go test -v -race -coverprofile=coverage.txt ./...

      - name: Build Check
        run: |
          echo "Vérification de la compilation (Linux)..."
          go build -v -o /dev/null ./...
          echo "Vérification de la compilation (Windows)..."
          GOOS=windows GOARCH=amd64 go build -v -o /dev/null ./...
